三、技术选型
| 模块        | 选型                                                                                                    |
| --------- | ----------------------------------------------------------------------------------------------------- |
| API       | FastAPI                                                                                               |
| Embedding | BGE-M3                                                                                                |
| Vector DB | Qdrant                                                                                                |
| BM25      | rank-bm25                                                                                             |
| Reranker  | BGE Reranker                                                                                          |
| Cache     | Redis                                                                                                 |
| Metadata  | SQLite                                                                                                |
| LLM       | [Ollama](https://ollama.com?utm_source=chatgpt.com) / [vLLM](https://vllm.ai/?utm_source=chatgpt.com) |
| Deploy    | [Docker](https://www.docker.com/?utm_source=chatgpt.com)                                              |


